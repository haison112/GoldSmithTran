services:
  - type: web
    name: landing-page-forex
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SITE_URL
        sync: false
      - key: FB_PIXEL_ID
        sync: false
